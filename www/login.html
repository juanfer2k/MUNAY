<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="shortcut icon" href="favicon.ico">
    <title>Acceso - Turnos</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',Roboto,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg,#0b2a3e,#1a4b6d);padding:20px}
        .login-card{background:#fff;border-radius:24px;padding:40px 32px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.35)}
        .login-header{text-align:center;margin-bottom:32px}
        .login-header svg{width:56px;height:56px;fill:#1a5276}
        .login-header h1{font-size:24px;font-weight:600;color:#0b2a3e;margin-top:8px}
        .login-header p{font-size:14px;color:#5d6d7e}
        .form-group{margin-bottom:20px}
        .form-group label{display:block;font-size:13px;font-weight:500;color:#2c3e50;margin-bottom:5px}
        .input-wrapper{position:relative}
        .input-wrapper svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;fill:#95a5a6}
        .input-wrapper input{width:100%;padding:12px 16px 12px 44px;border:2px solid #e0e6ed;border-radius:12px;font-size:15px;background:#f8fafc;transition:0.2s}
        .input-wrapper input:focus{border-color:#2E86C1;outline:none;box-shadow:0 0 0 4px rgba(46,134,193,0.15);background:#fff}
        .form-options{display:flex;justify-content:space-between;align-items:center;font-size:13px;margin:6px 0 22px}
        .form-options a{color:#2E86C1;text-decoration:none;font-weight:500}
        .btn-login{width:100%;padding:14px;background:#1a5276;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;transition:0.2s}
        .btn-login:hover{background:#0e3a54}
        .msg-error,.msg-success{padding:12px 16px;border-radius:10px;font-size:13px;margin-top:16px;display:none}
        .msg-error{background:#fde8e8;color:#922B21;border-left:4px solid #922B21}
        .msg-success{background:#e3f5eb;color:#1E8449;border-left:4px solid #1E8449}
        .visible{display:block}
        @media(max-width:480px){.login-card{padding:28px 20px}}
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-header">
        <img src="img/MUNAY-pq.webp" alt="Fundación MUNAY" style="max-width:120px;">
        <h1>Turnos</h1>
        <p>Gestión de turnos y transporte de menores custodiados</p>
    </div>
    <form id="loginForm" method="POST" action="api/login_por_id.php">
        <div class="form-group">
            <label for="id_usuario">Cédula o ID</label>
            <div class="input-wrapper">
                <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                <input type="text" id="id_usuario" name="id_usuario" placeholder="Ingrese su cédula" required>
            </div>
        </div>
        <div class="form-group">
            <label for="password">Contraseña</label>
            <div class="input-wrapper">
                <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
        </div>
        <div class="form-options">
            <label><input type="checkbox" id="remember" name="remember"> Recordarme</label>
        </div>
        <button type="submit" class="btn-login">Ingresar</button>
        <div id="errorMsg" class="msg-error"></div>
        <div id="successMsg" class="msg-success"></div>
    </form>
</div>

<script>
// ===== LOGIN POR ID/CÉDULA CON VERIFICACIÓN AJAX =====
document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const id_usuario = document.getElementById('id_usuario').value;
    const password = document.getElementById('password').value;
    const errorDiv = document.getElementById('errorMsg');
    const successDiv = document.getElementById('successMsg');

    errorDiv.classList.remove('visible');
    successDiv.classList.remove('visible');

    try {
        const formData = new FormData();
        formData.append('id_usuario', id_usuario);
        formData.append('password', password);

        const res = await fetch('/MUNAY/www/api/login_por_id.php', {
            method: 'POST',
            body: formData
        });
        const data = await res.json();

        if (data.success) {
            successDiv.textContent = '✅ ' + (data.mensaje || 'Login exitoso');
            successDiv.classList.add('visible');
            
            // Redirigir a dashboard después de 1 segundo
            setTimeout(() => {
                window.location.href = data.redirect || 'dashboard.php';
            }, 1000);
        } else {
            let errorText = data.error || 'Credenciales incorrectas';
            
            // Mostrar intentos restantes si aplica
            if (data.intentos_restantes !== undefined && data.intentos_restantes > 0) {
                errorText += ` (${data.intentos_restantes} intentos restantes)`;
            }
            
            // Mostrar bloqueo temporal si aplica
            if (data.bloqueado) {
                errorText = '⚠️ Cuenta bloqueada temporalmente. Intente más tarde.';
            }
            
            errorDiv.textContent = errorText;
            errorDiv.classList.add('visible');
        }
    } catch (err) {
        errorDiv.textContent = 'Error de conexión. Verifica tu internet.';
        errorDiv.classList.add('visible');
        console.error('Login error:', err);
    }
});
</script>
</body>
</html>
